<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Mission Control — OpenClaw</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2234;--border:#1f2937;
  --primary:#3b82f6;--primary-dim:#1e3a5f;--success:#10b981;--warning:#f59e0b;
  --error:#ef4444;--text:#f9fafb;--muted:#9ca3af;--dim:#6b7280;
  --radius:8px;--radius-lg:12px;
  --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:"SF Mono","Cascadia Code","Fira Code",Consolas,monospace;
}
html{font-size:14px}
body{font-family:var(--font-ui);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{color:var(--primary);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:var(--text)}
input{font-family:inherit;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;width:100%;outline:none;font-size:.95rem}
input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(59,130,246,.25)}
input::placeholder{color:var(--dim)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh}
.navbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
.navbar .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:1.05rem;white-space:nowrap}
.navbar .brand span{font-size:1.2rem}
.nav-tabs{display:flex;gap:2px;overflow-x:auto}
.nav-tabs button{padding:8px 16px;border-radius:var(--radius) var(--radius) 0 0;font-size:.85rem;font-weight:500;color:var(--muted);transition:all .15s;white-space:nowrap}
.nav-tabs button:hover{color:var(--text);background:var(--surface2)}
.nav-tabs button.active{color:var(--primary);background:var(--bg);border-bottom:2px solid var(--primary)}
.nav-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.conn-status{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--muted)}
.conn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.conn-dot.connected{background:var(--success);box-shadow:0 0 6px var(--success)}
.conn-dot.connecting{background:var(--warning);animation:pulse 1s infinite}
.conn-dot.disconnected{background:var(--error)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.icon-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--muted);transition:all .15s}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.main-content{flex:1;padding:20px;overflow-y:auto}

/* Setup screen */
.setup-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;width:100%;max-width:440px;text-align:center}
.setup-card h1{font-size:1.6rem;margin-bottom:6px}
.setup-card .subtitle{color:var(--muted);margin-bottom:28px;font-size:.9rem}
.setup-card .field{margin-bottom:16px;text-align:left}
.setup-card label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.btn-primary{background:var(--primary);color:#fff;padding:10px 24px;border-radius:var(--radius);font-weight:600;font-size:.95rem;width:100%;transition:all .15s}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.setup-help{margin-top:20px;font-size:.78rem;color:var(--dim);line-height:1.5}
.setup-help code{background:var(--surface2);padding:2px 6px;border-radius:4px;font-family:var(--font-mono);font-size:.75rem}
.banner{padding:12px 16px;border-radius:var(--radius);margin-bottom:16px;font-size:.85rem;display:flex;align-items:center;gap:8px}
.banner.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--error)}
.banner.warning{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:var(--warning)}
.banner.info{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3);color:var(--primary)}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Stat cards */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;position:relative;overflow:hidden}
.stat-card .stat-label{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-card .stat-value{font-size:1.8rem;font-weight:700;font-family:var(--font-mono)}
.stat-card .stat-sub{font-size:.75rem;color:var(--dim);margin-top:4px}
.stat-card .stat-icon{position:absolute;top:16px;right:16px;font-size:1.4rem;opacity:.5}

/* Panels */
.panels{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:16px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-direction:column;max-height:420px}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-header h3{font-size:.85rem;font-weight:600}
.panel-header .badge{font-size:.7rem;background:var(--surface2);padding:2px 8px;border-radius:10px;color:var(--muted)}
.panel-body{padding:12px 18px;overflow-y:auto;flex:1}
.panel-body:empty::after{content:"No data available";display:block;text-align:center;color:var(--dim);padding:30px 0;font-size:.85rem}

/* Table rows */
.row-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(31,41,55,.5);font-size:.82rem}
.row-item:last-child{border-bottom:none}
.row-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.row-item .title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-item .meta{color:var(--muted);font-family:var(--font-mono);font-size:.75rem;white-space:nowrap}
.tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.7rem;font-weight:600}
.tag.running{background:rgba(59,130,246,.15);color:var(--primary)}
.tag.success{background:rgba(16,185,129,.15);color:var(--success)}
.tag.error{background:rgba(239,68,68,.15);color:var(--error)}
.tag.warning{background:rgba(245,158,11,.15);color:var(--warning)}
.tag.muted{background:var(--surface2);color:var(--muted)}

/* Kanban */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;min-height:calc(100vh - 160px)}
.kanban-col{min-width:260px;max-width:300px;flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-direction:column}
.kanban-col-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.kanban-col-header h4{font-size:.8rem;font-weight:600}
.kanban-col-header .count{font-size:.7rem;color:var(--muted);background:var(--surface2);padding:1px 7px;border-radius:8px}
.kanban-col-body{padding:8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px}
.kanban-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-size:.8rem}
.kanban-card .card-title{font-weight:600;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kanban-card .card-meta{color:var(--muted);font-size:.72rem;display:flex;flex-wrap:wrap;gap:4px 10px}
.kanban-card .card-meta span{white-space:nowrap}

/* Tree */
.tree{padding:0}
.tree-node{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;background:var(--surface)}
.tree-parent{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.tree-parent:hover{background:var(--surface2)}
.tree-parent .arrow{transition:transform .15s;color:var(--dim);font-size:.7rem}
.tree-parent.expanded .arrow{transform:rotate(90deg)}
.tree-parent .task-info{flex:1;min-width:0}
.tree-parent .task-title{font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-parent .task-meta{font-size:.72rem;color:var(--muted);margin-top:2px}
.tree-children{padding:4px 18px 12px 42px;display:none}
.tree-children.show{display:block}
.tree-child{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;font-size:.8rem}
.tree-child .child-info{flex:1;min-width:0}
.tree-child .child-title{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-child .child-meta{font-size:.72rem;color:var(--muted);margin-top:1px}

/* Run detail */
.run-search{margin-bottom:16px;position:relative}
.run-search input{padding-left:36px}
.run-search .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dim)}
.run-list{display:flex;flex-direction:column;gap:8px}
.run-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color .15s}
.run-item:hover{border-color:var(--primary)}
.run-item-header{display:flex;align-items:center;gap:12px;padding:14px 18px}
.run-item-header .run-title{flex:1;font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.run-item-header .run-meta{display:flex;gap:12px;align-items:center;flex-shrink:0}
.run-item-header .run-meta span{font-size:.75rem;color:var(--muted);font-family:var(--font-mono)}
.run-detail{padding:0 18px 16px;border-top:1px solid var(--border);display:none}
.run-detail.show{display:block}
.run-detail h4{font-size:.8rem;font-weight:600;color:var(--muted);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.5px}
.run-detail .timeline{position:relative;padding-left:20px}
.run-detail .timeline::before{content:"";position:absolute;left:4px;top:0;bottom:0;width:1px;background:var(--border)}
.run-detail .tl-item{position:relative;padding:6px 0;font-size:.8rem}
.run-detail .tl-item::before{content:"";position:absolute;left:-18px;top:10px;width:7px;height:7px;border-radius:50%;background:var(--border)}
.run-detail .tl-item.tool::before{background:var(--primary)}
.run-detail .tl-item.error::before{background:var(--error)}
.run-detail .tl-item .tl-time{font-size:.7rem;color:var(--dim);font-family:var(--font-mono)}
.run-detail .tl-item .tl-text{margin-top:2px}
.run-detail pre{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px;font-size:.75rem;font-family:var(--font-mono);overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;color:var(--muted)}
.run-detail .kv{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;font-size:.8rem}
.run-detail .kv dt{color:var(--muted);white-space:nowrap}
.run-detail .kv dd{font-family:var(--font-mono)}

/* Skeleton */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius);height:16px;margin-bottom:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton.h{height:40px}
.skeleton.w50{width:50%}
.skeleton.w30{width:30%}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--dim)}
.empty-state .empty-icon{font-size:2rem;margin-bottom:8px;opacity:.5}
.empty-state p{font-size:.85rem}

/* Updated ago */
.updated-ago{font-size:.72rem;color:var(--dim);text-align:right;padding:4px 0}

/* Settings modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:420px}
.modal h2{font-size:1.1rem;margin-bottom:18px}
.modal .field{margin-bottom:14px}
.modal label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.modal .btn-row{display:flex;gap:10px;margin-top:20px}
.modal .btn-row button{flex:1;padding:9px;border-radius:var(--radius);font-weight:600;font-size:.85rem}
.modal .btn-secondary{background:var(--surface2);border:1px solid var(--border)}
.modal .btn-danger{background:rgba(239,68,68,.15);color:var(--error);border:1px solid rgba(239,68,68,.3)}

/* Responsive */
@media(max-width:768px){
  .navbar{padding:0 12px;gap:6px}
  .nav-tabs button{padding:6px 10px;font-size:.78rem}
  .main-content{padding:12px}
  .stat-row{grid-template-columns:repeat(2,1fr);gap:10px}
  .panels{grid-template-columns:1fr}
  .kanban-col{min-width:220px}
  .conn-url{display:none}
}
@media(max-width:480px){
  .stat-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app">
  <!-- Setup Screen -->
  <div id="setup" class="setup-overlay">
    <div class="setup-card">
      <h1>⚡ Mission Control</h1>
      <p class="subtitle">Connect to your OpenClaw Gateway</p>
      <div id="setup-banner"></div>
      <div class="field">
        <label>Gateway URL</label>
        <input id="inp-url" type="text" placeholder="wss://your-server:18789" autocomplete="url" spellcheck="false">
      </div>
      <div class="field">
        <label>Token</label>
        <input id="inp-token" type="password" placeholder="Gateway auth token" autocomplete="current-password">
      </div>
      <button id="btn-connect" class="btn-primary" onclick="doConnect()">Connect</button>
      <div class="setup-help">
        Find your token by running<br>
        <code>openclaw config get gateway.auth.token</code><br>
        on the machine running your gateway.
      </div>
    </div>
  </div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar" style="display:none">
    <div class="brand"><span>⚡</span> Mission Control</div>
    <div class="nav-tabs" id="nav-tabs">
      <button class="active" data-tab="command">Command Center</button>
      <button data-tab="kanban">Task Board</button>
      <button data-tab="missions">Mission Board</button>
      <button data-tab="runs">Run Detail</button>
    </div>
    <div class="nav-right">
      <div class="conn-status">
        <div class="conn-dot disconnected" id="conn-dot"></div>
        <span id="conn-text">Disconnected</span>
        <span class="conn-url" id="conn-url"></span>
      </div>
      <button class="icon-btn" onclick="refreshData()" title="Refresh">&#x21bb;</button>
      <button class="icon-btn" onclick="showSettings()" title="Settings">&#x2699;</button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content" id="content" style="display:none">
    <!-- Command Center -->
    <div id="tab-command" class="tab-pane">
      <div class="stat-row" id="stat-cards"></div>
      <div class="updated-ago" id="updated-ago"></div>
      <div class="panels" id="cmd-panels"></div>
    </div>

    <!-- Kanban -->
    <div id="tab-kanban" class="tab-pane" style="display:none">
      <div class="kanban" id="kanban-board"></div>
    </div>

    <!-- Missions -->
    <div id="tab-missions" class="tab-pane" style="display:none">
      <div id="mission-tree"></div>
    </div>

    <!-- Runs -->
    <div id="tab-runs" class="tab-pane" style="display:none">
      <div class="run-search">
        <span class="search-icon">&#x1F50D;</span>
        <input id="run-search-input" type="text" placeholder="Search runs by id, model, channel..." oninput="filterRuns()">
      </div>
      <div class="run-list" id="run-list"></div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)hideSettings()">
  <div class="modal">
    <h2>&#x2699; Settings</h2>
    <div class="field">
      <label>Gateway URL</label>
      <input id="set-url" type="text" spellcheck="false">
    </div>
    <div class="field">
      <label>Token</label>
      <input id="set-token" type="password">
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="hideSettings()">Cancel</button>
      <button class="btn-primary" onclick="saveSettings()">Save &amp; Reconnect</button>
    </div>
    <div class="btn-row">
      <button class="btn-danger" onclick="resetAll()">Reset All Data</button>
    </div>
  </div>
</div>

<script>
// ── State ──
const LS_PREFIX = 'oc_mc_';
const ls = {
  get: k => localStorage.getItem(LS_PREFIX + k),
  set: (k, v) => localStorage.setItem(LS_PREFIX + k, v),
  del: k => localStorage.removeItem(LS_PREFIX + k)
};

let ws = null;
let connected = false;
let pendingRpc = {};
let challengeData = null;
let reconnectAttempts = 0;
let reconnectTimer = null;
let refreshTimer = null;
let lastUpdate = 0;
let agoTimer = null;

// Cached data
let dataCache = { status: null, health: null, sessions: null, cron: null, presence: null, models: null, nodes: null };
let allSessions = [];

// ── Crypto Helpers ──
function b64Encode(buf) {
  const bytes = new Uint8Array(buf);
  let s = '';
  for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
  return btoa(s);
}
function b64Decode(s) {
  const bin = atob(s);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf;
}
function hexEncode(buf) {
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function getOrCreateKeypair() {
  const stored = ls.get('privkey');
  if (stored) {
    try {
      const priv = b64Decode(ls.get('privkey'));
      const pub = b64Decode(ls.get('pubkey'));
      const privKey = await crypto.subtle.importKey('pkcs8', priv, { name: 'Ed25519' }, true, ['sign']);
      const pubKey = await crypto.subtle.importKey('spki', pub, { name: 'Ed25519' }, true, ['verify']);
      return { privateKey: privKey, publicKey: pubKey };
    } catch (e) {
      console.warn('Failed to import stored keys, regenerating', e);
    }
  }
  const kp = await crypto.subtle.generateKey({ name: 'Ed25519' }, true, ['sign', 'verify']);
  const privExport = await crypto.subtle.exportKey('pkcs8', kp.privateKey);
  const pubExport = await crypto.subtle.exportKey('spki', kp.publicKey);
  ls.set('privkey', b64Encode(privExport));
  ls.set('pubkey', b64Encode(pubExport));
  return kp;
}

async function getDeviceId(pubKey) {
  const raw = await crypto.subtle.exportKey('raw', pubKey);
  const hash = await crypto.subtle.digest('SHA-256', raw);
  return hexEncode(hash);
}

async function signChallenge(privKey, payload) {
  const data = new TextEncoder().encode(JSON.stringify(payload));
  const sig = await crypto.subtle.sign({ name: 'Ed25519' }, privKey, data);
  return b64Encode(sig);
}

// ── WebSocket ──
function doConnect() {
  const urlInput = document.getElementById('inp-url');
  const tokenInput = document.getElementById('inp-token');
  const url = (urlInput.value || '').trim();
  const token = (tokenInput.value || '').trim();
  if (!url || !token) {
    showSetupBanner('error', 'Please enter both gateway URL and token.');
    return;
  }
  ls.set('url', url);
  ls.set('token', token);
  showSetupBanner('info', '<span class="spinner"></span> Connecting...');
  document.getElementById('btn-connect').disabled = true;
  startWebSocket();
}

function startWebSocket() {
  if (ws) { try { ws.close(); } catch(e) {} }
  const url = ls.get('url');
  if (!url) return;

  setConnState('connecting');
  try {
    ws = new WebSocket(url);
  } catch (e) {
    setConnState('disconnected');
    showSetupBanner('error', 'Invalid WebSocket URL.');
    document.getElementById('btn-connect').disabled = false;
    return;
  }

  ws.onopen = () => { console.log('WS open'); };

  ws.onmessage = async (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch(e) { return; }

    if (msg.type === 'event' && msg.event === 'connect.challenge') {
      challengeData = msg.payload;
      await handleChallenge(msg.payload);
    } else if (msg.type === 'res') {
      const cb = pendingRpc[msg.id];
      if (cb) {
        delete pendingRpc[msg.id];
        cb(msg);
      }
    } else if (msg.type === 'event') {
      handleEvent(msg);
    }
  };

  ws.onclose = (evt) => {
    console.log('WS close', evt.code, evt.reason);
    connected = false;
    setConnState('disconnected');
    if (evt.code === 1008) {
      showPairingRequired();
      return;
    }
    scheduleReconnect();
  };

  ws.onerror = () => {
    console.log('WS error');
  };
}

async function handleChallenge(payload) {
  try {
    const kp = await getOrCreateKeypair();
    const deviceId = await getDeviceId(kp.publicKey);
    const pubRaw = await crypto.subtle.exportKey('raw', kp.publicKey);
    const pubB64 = b64Encode(pubRaw);
    const token = ls.get('token');
    const now = Math.floor(Date.now() / 1000);

    const sigPayload = {
      v: 'v3',
      deviceId,
      clientId: 'mission-control',
      role: 'operator',
      scopes: ['operator.read', 'operator.write'],
      token,
      nonce: payload.nonce,
      signedAt: now,
      platform: 'web',
      deviceFamily: 'browser'
    };

    const sig = await signChallenge(kp.privateKey, sigPayload);
    const deviceToken = ls.get('deviceToken');
    const auth = { token };
    if (deviceToken) auth.deviceToken = deviceToken;

    const req = {
      type: 'req',
      id: crypto.randomUUID(),
      method: 'connect',
      params: {
        minProtocol: 3,
        maxProtocol: 3,
        client: { id: 'mission-control', version: '1.0.0', platform: 'web', mode: 'operator' },
        role: 'operator',
        scopes: ['operator.read', 'operator.write'],
        caps: [],
        commands: [],
        permissions: {},
        auth,
        locale: navigator.language || 'en-US',
        userAgent: 'mission-control/1.0.0',
        device: {
          id: deviceId,
          publicKey: pubB64,
          signature: sig,
          signedAt: now,
          nonce: payload.nonce
        }
      }
    };

    pendingRpc[req.id] = (res) => handleConnectResponse(res, deviceId);
    ws.send(JSON.stringify(req));
  } catch (e) {
    console.error('Challenge handling failed', e);
    showSetupBanner('error', 'Crypto error: ' + e.message);
    document.getElementById('btn-connect').disabled = false;
  }
}

function handleConnectResponse(res, deviceId) {
  if (res.ok) {
    connected = true;
    reconnectAttempts = 0;
    if (res.payload && res.payload.deviceToken) {
      ls.set('deviceToken', res.payload.deviceToken);
    }
    ls.set('deviceId', deviceId);
    setConnState('connected');
    showDashboard();
    refreshData();
    startAutoRefresh();
  } else {
    const code = res.error && res.error.code;
    const msg = (res.error && res.error.message) || 'Connection refused';
    if (code === 'PAIRING_REQUIRED') {
      showPairingRequired(deviceId);
    } else if (code === 'AUTH_FAILED' || code === 'UNAUTHORIZED') {
      showSetupBanner('error', 'Authentication failed. Check your token.');
      document.getElementById('btn-connect').disabled = false;
    } else {
      showSetupBanner('error', msg);
      document.getElementById('btn-connect').disabled = false;
    }
  }
}

function showPairingRequired(deviceId) {
  const id = deviceId || ls.get('deviceId') || '&lt;device-id&gt;';
  const shortId = id.substring(0, 12) + '...';
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('navbar').style.display = 'none';
  document.getElementById('content').style.display = 'none';
  showSetupBanner('warning',
    `⚠️ Pairing Required — run <code>openclaw devices approve ${shortId}</code> on your gateway host, then click Reconnect.`
  );

  document.getElementById('btn-connect').textContent = 'Reconnect';
}

// ── RPC ──
function rpc(method, params = {}) {
  return new Promise((resolve, reject) => {
    if (!ws || ws.readyState !== 1) { reject(new Error('Not connected')); return; }
    const id = crypto.randomUUID();
    const timeout = setTimeout(() => { delete pendingRpc[id]; reject(new Error('RPC timeout')); }, 15000);
    pendingRpc[id] = (res) => {
      clearTimeout(timeout);
      if (res.ok) resolve(res.payload); else reject(res.error || new Error('RPC error'));
    };
    ws.send(JSON.stringify({ type: 'req', id, method, params }));
  });
}

async function refreshData() {
  if (!connected) return;
  const methods = [
    ['status', {}], ['health', {}], ['sessions.list', {}],
    ['cron.list', {}], ['system-presence', {}], ['models.list', {}], ['node.list', {}]
  ];
  const results = await Promise.allSettled(methods.map(([m, p]) => rpc(m, p)));
  const keys = ['status', 'health', 'sessions', 'cron', 'presence', 'models', 'nodes'];
  keys.forEach((k, i) => {
    if (results[i].status === 'fulfilled') dataCache[k] = results[i].value;
  });
  if (dataCache.sessions) {
    allSessions = Array.isArray(dataCache.sessions) ? dataCache.sessions :
      (dataCache.sessions.sessions || dataCache.sessions.items || []);
  }
  lastUpdate = Date.now();
  renderCurrentTab();
}

// ── Auto-refresh ──
function startAutoRefresh() {
  stopAutoRefresh();
  refreshTimer = setInterval(() => refreshData(), 15000);
  agoTimer = setInterval(updateAgo, 1000);
}
function stopAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  if (agoTimer) clearInterval(agoTimer);
}
function updateAgo() {
  const el = document.getElementById('updated-ago');
  if (!el || !lastUpdate) return;
  const secs = Math.floor((Date.now() - lastUpdate) / 1000);
  el.textContent = `Last updated: ${secs}s ago`;
}

// ── Reconnect ──
function scheduleReconnect() {
  if (reconnectTimer) return;
  const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
  reconnectAttempts++;
  console.log(`Reconnecting in ${delay}ms (attempt ${reconnectAttempts})`);
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    startWebSocket();
  }, delay);
}

// ── Render: Kanban ──
function renderKanban() {
  const el = document.getElementById('kanban-board');
  const sessions = allSessions;

  const columns = [
    { key: 'inbox', label: 'Inbox', color: 'var(--muted)', states: ['inbox', 'pending'] },
    { key: 'queued', label: 'Queued', color: 'var(--warning)', states: ['queued'] },
    { key: 'running', label: 'Running', color: 'var(--primary)', states: ['running', 'active'] },
    { key: 'tool', label: 'Waiting on Tool', color: '#8b5cf6', states: ['waiting_tool', 'tool_call', 'waiting-tool'] },
    { key: 'human', label: 'Waiting on Human', color: '#ec4899', states: ['waiting_human', 'waiting-human', 'paused'] },
    { key: 'completed', label: 'Completed', color: 'var(--success)', states: ['completed', 'done', 'finished'] },
    { key: 'failed', label: 'Failed', color: 'var(--error)', states: ['failed', 'error'] },
    { key: 'archived', label: 'Archived', color: 'var(--dim)', states: ['archived'] }
  ];

  const buckets = {};
  columns.forEach(c => buckets[c.key] = []);

  sessions.forEach(s => {
    const state = (s.status || s.state || '').toLowerCase();
    let placed = false;
    for (const col of columns) {
      if (col.states.includes(state)) { buckets[col.key].push(s); placed = true; break; }
    }
    if (!placed) {
      // Put in inbox if unknown or in completed if it looks done
      if (state.includes('complet') || state.includes('done')) buckets.completed.push(s);
      else if (state.includes('fail') || state.includes('err')) buckets.failed.push(s);
      else buckets.inbox.push(s);
    }
  });

  el.innerHTML = columns.map(col => `
    <div class="kanban-col">
      <div class="kanban-col-header">
        <h4 style="color:${col.color}">${esc(col.label)}</h4>
        <span class="count">${buckets[col.key].length}</span>
      </div>
      <div class="kanban-col-body">
        ${buckets[col.key].length ? buckets[col.key].slice(0, 50).map(s => `
          <div class="kanban-card">
            <div class="card-title">${esc(sessionTitle(s))}</div>
            <div class="card-meta">
              ${s.agentId || s.agent ? `<span>🤖 ${esc(s.agentId || s.agent)}</span>` : ''}
              ${s.model || s.agentModel ? `<span>🧠 ${esc((s.model || s.agentModel || '').split('/').pop())}</span>` : ''}
              ${s.channel ? `<span>📡 ${esc(s.channel)}</span>` : ''}
              ${s.tokens || s.totalTokens ? `<span>🪙 ${fmtNum(s.tokens || s.totalTokens || 0)}</span>` : ''}
              <span>⏱ ${formatDuration(elapsed(s))}</span>
            </div>
          </div>
        `).join('') : '<div class="empty-state"><p>Empty</p></div>'}
      </div>
    </div>
  `).join('');
}

// ── Render: Missions ──
function renderMissions() {
  const el = document.getElementById('mission-tree');
  const sessions = allSessions;

  // Build parent/child relationships
  const byId = {};
  sessions.forEach(s => byId[s.id || s.sessionId] = s);

  const children = {};
  const roots = [];
  sessions.forEach(s => {
    const pid = s.parentId || s.parent || s.parentSessionId;
    if (pid && byId[pid]) {
      if (!children[pid]) children[pid] = [];
      children[pid].push(s);
    } else if (pid && !byId[pid]) {
      // Orphan with parent ref — treat as root
      roots.push(s);
    } else if (!pid) {
      roots.push(s);
    }
  });

  // Only show roots that have children (missions with subagents)
  const missions = roots.filter(r => {
    const id = r.id || r.sessionId;
    return children[id] && children[id].length > 0;
  });

  // Also add standalone roots that are running (might get children)
  const activeRoots = roots.filter(r => {
    const id = r.id || r.sessionId;
    const st = (r.status || r.state || '').toLowerCase();
    return !children[id] && (st === 'running' || st === 'active');
  });

  const allMissions = [...missions, ...activeRoots];

  if (!allMissions.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🌳</div><p>No active missions with subagents.<br>Parent/child session trees will appear here.</p></div>`;
    return;
  }

  el.innerHTML = allMissions.map((s, i) => {
    const sid = s.id || s.sessionId;
    const kids = children[sid] || [];
    const st = statusTag(s);
    return `
      <div class="tree-node">
        <div class="tree-parent" onclick="toggleTree(this)" ${i === 0 ? 'class="tree-parent expanded"' : ''}>
          <span class="arrow">▶</span>
          <div class="task-info">
            <div class="task-title">${esc(sessionTitle(s))}</div>
            <div class="task-meta">${esc(s.model || s.agentModel || '')} · ${formatDuration(elapsed(s))} · ${kids.length} subagent${kids.length !== 1 ? 's' : ''}</div>
          </div>
          ${st}
        </div>
        <div class="tree-children ${i === 0 ? 'show' : ''}">
          ${kids.length ? kids.map(c => `
            <div class="tree-child">
              <div class="dot" style="background:${stateColor(c)}"></div>
              <div class="child-info">
                <div class="child-title">${esc(sessionTitle(c))}</div>
                <div class="child-meta">${esc(c.model || c.agentModel || '')} · ${formatDuration(elapsed(c))}${c.currentTool ? ' · 🔧 ' + esc(c.currentTool) : ''}${c.error ? ' · ❌ ' + esc(typeof c.error === 'string' ? c.error : c.error.message || 'Error') : ''}</div>
              </div>
              ${statusTag(c)}
            </div>
          `).join('') : '<div style="color:var(--dim);font-size:.8rem;padding:4px 0">No subagents yet</div>'}
        </div>
      </div>`;
  }).join('');
}

function toggleTree(el) {
  el.classList.toggle('expanded');
  const children = el.nextElementSibling;
  children.classList.toggle('show');
}

// ── Helpers ──
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function sessionTitle(s) {
  return s.title || s.name || s.description || s.label ||
    (s.firstMessage ? (typeof s.firstMessage === 'string' ? s.firstMessage.substring(0, 60) : 'Session') : null) ||
    s.id || s.sessionId || 'Untitled Session';
}

function elapsed(s) {
  const start = s.startedAt || s.createdAt;
  if (!start) return 0;
  const end = s.endedAt || s.completedAt || (Date.now() / 1000);
  return Math.max(0, end - start);
}

function formatDuration(secs) {
  if (!secs || secs < 0) return '—';
  secs = Math.floor(secs);
  if (secs < 60) return secs + 's';
  if (secs < 3600) return Math.floor(secs / 60) + 'm ' + (secs % 60) + 's';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return h + 'h ' + m + 'm';
}

function timeAgo(ts) {
  if (!ts) return '—';
  const secs = Math.floor(Date.now() / 1000 - ts);
  if (secs < 60) return secs + 's ago';
  if (secs < 3600) return Math.floor(secs / 60) + 'm ago';
  if (secs < 86400) return Math.floor(secs / 3600) + 'h ago';
  return Math.floor(secs / 86400) + 'd ago';
}

function fmtNum(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

function stateColor(s) {
  const st = (s.status || s.state || '').toLowerCase();
  if (st === 'running' || st === 'active') return 'var(--primary)';
  if (st === 'completed' || st === 'done' || st === 'finished') return 'var(--success)';
  if (st === 'failed' || st === 'error') return 'var(--error)';
  if (st === 'queued') return 'var(--warning)';
  if (st.includes('waiting')) return '#8b5cf6';
  return 'var(--muted)';
}

function statusTag(s) {
  const st = (s.status || s.state || 'unknown').toLowerCase();
  let cls = 'muted';
  if (st === 'running' || st === 'active') cls = 'running';
  else if (st === 'completed' || st === 'done') cls = 'success';
  else if (st === 'failed' || st === 'error') cls = 'error';
  else if (st === 'queued' || st.includes('waiting')) cls = 'warning';
  return `<span class="tag ${cls}">${esc(st)}</span>`;
}

function emptyHTML(msg) {
  return `<div class="empty-state"><p>${msg}</p></div>`;
}

// ── Settings ──
function showSettings() {
  document.getElementById('set-url').value = ls.get('url') || '';
  document.getElementById('set-token').value = ls.get('token') || '';
  document.getElementById('settings-modal').style.display = 'flex';
}
function hideSettings() {
  document.getElementById('settings-modal').style.display = 'none';
}
function saveSettings() {
  const url = document.getElementById('set-url').value.trim();
  const token = document.getElementById('set-token').value.trim();
  if (!url || !token) return;
  ls.set('url', url);
  ls.set('token', token);
  hideSettings();
  connected = false;
  reconnectAttempts = 0;
  startWebSocket();
}
function resetAll() {
  if (!confirm('Reset all Mission Control data? You will need to re-enter your gateway URL and token.')) return;
  ['url', 'token', 'privkey', 'pubkey', 'deviceToken', 'deviceId'].forEach(k => ls.del(k));
  stopAutoRefresh();
  if (ws) try { ws.close(); } catch(e) {}
  hideSettings();
  location.reload();
}

// ── Init ──
function init() {
  const url = ls.get('url');
  const token = ls.get('token');
  if (url && token) {
    document.getElementById('inp-url').value = url;
    document.getElementById('inp-token').value = token;
    // Auto-connect if we have stored credentials
    showSetupBanner('info', '<span class="spinner"></span> Reconnecting...');
    document.getElementById('btn-connect').disabled = true;
    startWebSocket();
  }
}

// Allow Enter key on setup form
document.getElementById('inp-url').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-token').focus(); });
document.getElementById('inp-token').addEventListener('keydown', e => { if (e.key === 'Enter') doConnect(); });

init();
</script>
